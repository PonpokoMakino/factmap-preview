<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ファクトマップ｜論点マップ（生ニュース・試作）</title>
<style>
  :root{
    --bg:#fbfbfa; --bg-2:#f4f4f2; --ink:#15181d; --ink-2:#4b515b; --ink-3:#6b7280;
    --line:#e6e6e2; --line-2:#efefea; --support:#2563eb; --attack:#c2410c; --neutral:#6b7280;
    --support-bg:rgba(37,99,235,.05); --attack-bg:rgba(194,65,12,.05); --neutral-bg:rgba(107,114,128,.05);
    --dot-prim:#0d9488; --dot-wire:#2563eb; --dot-press:#6b7280; --dot-op:#ea580c;
    --radius-s:8px; --radius:14px;
    --serif:"Yu Mincho","游明朝","Hiragino Mincho ProN","Noto Serif JP",serif;
    --sans:system-ui,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#131316; --bg-2:#1b1c20; --ink:#e9ebef; --ink-2:#aab0ba; --ink-3:#9aa1ac;
      --line:#2a2c31; --line-2:#23252a; --support:#6aa5fb; --attack:#fb923c;
      --support-bg:rgba(106,165,251,.09); --attack-bg:rgba(251,146,60,.09); --neutral-bg:rgba(156,163,175,.08);}
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.6;}
  .wrap{max-width:720px; margin:0 auto; padding:24px 18px 80px;}
  a.back{font-size:12px; color:var(--ink-3); text-decoration:none;}
  .title{font-family:var(--serif); font-size:21px; font-weight:700; margin:8px 0 2px;}
  .lead{font-size:13px; color:var(--ink-2); margin:0 0 16px;}
  .map{border:1px solid var(--line); border-radius:var(--radius); padding:16px 17px; margin:0 0 20px; background:var(--bg);}
  .vol{font-size:11px; font-weight:700; color:var(--dot-prim); border:1px solid var(--dot-prim); border-radius:99px; padding:1px 9px;}
  .src-line{font-size:11px; color:var(--ink-3); margin-left:8px;}
  .warn{font-size:11px; color:var(--ink-2); background:var(--neutral-bg); border:1px dashed var(--line);
    border-radius:var(--radius-s); padding:8px 10px; margin:9px 0 13px; line-height:1.55;}
  .issue{font-family:var(--serif); font-size:18px; font-weight:600; line-height:1.5; margin:6px 0 14px;}
  .issue .q{color:var(--ink-3); margin-right:6px; font-weight:700;}
  .sec{font-size:11px; font-weight:700; color:var(--ink-3); letter-spacing:.03em; margin:14px 0 7px;}
  .fact{font-size:13.5px; color:var(--ink); line-height:1.6; padding:6px 0; border-top:1px solid var(--line-2);}
  .fact:first-of-type{border-top:none;}
  .chips{display:flex; flex-wrap:wrap; gap:5px; margin-top:4px;}
  .chip{display:inline-flex; align-items:center; gap:4px; font-size:10.5px; color:var(--ink-2);
    border:1px solid var(--line); border-radius:99px; padding:1px 8px;}
  .dot{width:6px; height:6px; border-radius:50%;}
  .stance{border-left:2px solid var(--c,var(--neutral)); background:var(--cbg,transparent);
    padding:9px 11px; margin:7px 0 0; border-radius:0 var(--radius-s) var(--radius-s) 0;}
  .stance.support{--c:var(--support); --cbg:var(--support-bg);}
  .stance.attack{--c:var(--attack); --cbg:var(--attack-bg);}
  .stance.neutral{--c:var(--neutral); --cbg:var(--neutral-bg);}
  .stance-h{font-size:11px; font-weight:700; color:var(--c,var(--ink-3)); margin-bottom:3px;}
  .stance-c{font-family:var(--serif); font-size:14px; font-weight:600; line-height:1.55; color:var(--ink);}
  .stance-actor{font-size:11px; color:var(--ink-3); margin-top:3px;}
  .consensus{background:var(--bg-2); border:1px solid var(--line); border-radius:var(--radius-s);
    padding:11px 13px; font-size:13px; color:var(--ink-2); line-height:1.6; margin-top:13px;}
  .note{font-size:11px; color:var(--ink-3); margin-top:9px; line-height:1.55;}
  .links{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .links a{font-size:11px; color:var(--ink-2); text-decoration:none; border:1px solid var(--line); border-radius:99px; padding:2px 9px;}
  .empty{font-size:13px; color:var(--ink-3); border:1px dashed var(--line); border-radius:var(--radius-s); padding:16px; text-align:center;}
  code{background:var(--bg-2); padding:1px 5px; border-radius:4px; font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← ホーム（出来事一覧）へ</a>
  <div class="title">論点マップ（生ニュース・試作）</div>
  <p class="lead">取り込んだ実ニュースを、争点→事実→立場の地図に。事実はAIが自前の言葉で書き直し、各立場は「誰が述べたか」を明示します（アプリは裁定しません）。</p>
  <div id="maps"><div class="empty">読み込み中…</div></div>
  <p class="note">※「立場」の色・並びは正しさ・多数派を意味しません。事実合意型の出来事には立場が出ません（賛否が割れていない）。</p>
</div>
<script>
var SRC={prim:['一次情報','var(--dot-prim)'],wire:['通信社','var(--dot-wire)'],press:['報道機関','var(--dot-press)'],op:['意見・SNS','var(--dot-op)']};
var HEAD={support:'賛成寄りの見方',attack:'反対寄りの見方',neutral:'中立・留保'};
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
function safe(u){return (typeof u==='string'&&/^https?:\/\//i.test(u))?u:'#';}
function shortSrc(s){return String(s||'').replace(' 主要ニュース','').replace('!ニュース 主要','').replace('ドットコム','');}
function chips(arr){return '<div class="chips">'+(arr||[]).map(function(s){var d=SRC[s.ty]||SRC.press;return '<span class="chip"><span class="dot" style="background:'+d[1]+'"></span>'+esc(s.l||s.actor||'出典')+'・'+d[0]+'</span>';}).join('')+'</div>';}
function stanceClass(s){return ['support','attack','neutral'].indexOf(s)>=0?s:'neutral';}
function render(maps){
  if(!maps||!maps.length){document.getElementById('maps').innerHTML='<div class="empty">論点マップがまだありません。<br><code>node ingest.mjs &gt; out-ingest.json</code> → <code>node cluster.mjs out-ingest.json &gt; out-events.json</code> → <code>node map.mjs out-events.json --top 4</code></div>';return;}
  document.getElementById('maps').innerHTML = maps.map(function(m){
    var h='<div class="map" id="'+esc(m.slug||'')+'"><div><span class="vol">'+m.independentSources+'社が報道</span><span class="src-line">'+(m.sources||[]).map(shortSrc).join('・')+'</span>'
      +(m.stasis?'<span class="src-line">｜争点の種類: '+esc(m.stasis)+'</span>':'')+'</div>';
    h+='<div class="warn"><span aria-hidden="true">⚠️</span> 配信RSSの見出し・スニペットからAIが構造化した試作です（本文は未使用＝内容は浅め／本番は一次情報で厚くします）。</div>';
    h+='<div class="issue"><span class="q">争点</span>'+esc(m.issue||m.headline)+'</div>';
    h+='<div class="sec">事実の背骨（AIが自前の言葉で再記述）</div>';
    h+=(m.facts||[]).map(function(f){return '<div class="fact">'+esc(f.t)+chips(f.src)+'</div>';}).join('')||'<div class="fact" style="color:var(--ink-3)">（抽出された事実なし）</div>';
    if((m.positions||[]).length){
      h+='<div class="sec">立場（誰がどう述べたか）</div>';
      h+=(m.positions).map(function(p){var c=stanceClass(p.stance);return '<div class="stance '+c+'"><div class="stance-h">'+HEAD[c]+'</div><div class="stance-c">'+esc(p.claim)+'</div><div class="stance-actor">— '+esc(p.actor||'（特定度・低）')+'</div>'+chips(p.src)+'</div>';}).join('');
    }else{
      h+='<div class="note">論調の対立はほとんどありません＝事実合意型の出来事です。</div>';
    }
    if(m.consensus) h+='<div class="consensus">'+esc(m.consensus)+'</div>';
    var links=(m.links||[]).map(function(l){return '<a href="'+esc(safe(l.link))+'" target="_blank" rel="noopener">'+esc(shortSrc(l.source))+'の元記事 ↗</a>';}).join('');
    if(links) h+='<div class="links">'+links+'</div>';
    return h+'</div>';
  }).join('');
}
fetch('out-maps.json').then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){
  render(d.maps||[]);
  /* home.htmlの「論点マップを見る」から #slug で該当マップへ直行。
     rAF/smoothは背景タブで発火しないことがあるため、描画直後に同期でジャンプ＋対象を枠で強調 */
  if(location.hash){
    var el=document.getElementById(decodeURIComponent(location.hash.slice(1)));
    if(el){ el.scrollIntoView(); el.style.outline='2px solid var(--dot-prim)'; el.style.outlineOffset='4px'; }
  }
}).catch(function(){render([]);});
</script>
</body>
</html>
