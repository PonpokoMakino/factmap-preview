name: ニュース自動更新
on:
  schedule:
    - cron: '*/10 * * * *'   # 10分ごと（GitHubの下限は5分＋遅延あり。10分＋変化ガードが無料枠的に最適）
  workflow_dispatch: {}      # 手動実行も可
permissions:
  contents: write
concurrency: update-news
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: 取り込み→束ね（AI不使用・毎回実行）
        run: |
          node ingest.mjs --max 10 > out-ingest.json
          node cluster.mjs out-ingest.json > out-events.json
      - name: 変化チェック（ニュースが変わってなければAI工程をスキップ＝無料枠の節約）
        id: diff
        run: |
          if git diff --quiet -- out-events.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"; echo "変化なし→AI工程スキップ"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"; echo "変化あり→AI工程実行"
          fi
      - name: AI工程ゲート（無料枠が1日20回/モデルに縮小→AI工程は約6時間ごとに制限。手動実行は常に実行）
        id: aigate
        if: steps.diff.outputs.changed == 'true'
        run: |
          last=$(cat out-ai-stamp.txt 2>/dev/null || echo 0)
          now=$(date +%s)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ $((now - last)) -ge 19800 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "$now" > out-ai-stamp.txt; echo "AI工程を実行（前回から $(( (now - last) / 60 ))分）"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "AI工程は前回から6時間未満→スキップ（ニュース一覧の更新のみ）"
          fi
      - name: APIキーを配置（Secretsから・ログには出ない）
        if: steps.aigate.outputs.run == 'true'
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
      - name: 埋め込み→束ね直し→中立見出し→翻訳→論点マップ（軽い順＝枯渇時も見える部分が先に更新）
        if: steps.aigate.outputs.run == 'true'
        run: |
          node --env-file=.env embed.mjs out-ingest.json || echo "(埋め込みスキップ)"
          node cluster.mjs out-ingest.json > out-events.json
          node --env-file=.env neutralize.mjs out-ingest.json || echo "(中立見出しスキップ)"
          node --env-file=.env translate.mjs out-ingest.json || echo "(翻訳スキップ)"
          node --env-file=.env map.mjs out-events.json --top 4 || echo "(マップ一部スキップ)"
      - name: 変更があればコミット
        if: steps.diff.outputs.changed == 'true'
        run: |
          rm -f .env
          git config user.name "factmap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add out-events.json out-maps.json out-translations.json out-headlines.json
          git add out-ai-stamp.txt 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "chore: ニュース自動更新 [bot]" && git push)
